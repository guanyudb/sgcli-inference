experiment_name: ray-esm2-embed
environment:
  dependencies: dependencies.yaml
  env_variables:
    NCCL_NET_PLUGIN: "none"
    # Baseline: 1 A10. Currently single-pod (we use ray.init() locally, not
    # @ray_launch — see embed.py for why). True multi-A10 scaling needs to
    # run from a notebook, not sgcli.
    NUM_WORKERS: "1"
    BATCH_SIZE: "32"
    MAX_LENGTH: "1024"
    ESM2_MODEL: "facebook/esm2_t33_650M_UR50D"
    # UC Volume paths — stage input via prep_data.py FIRST.
    INPUT_STAGE_DIR:      "/Volumes/<cat>/<schema>/sgc/ray_input_stage"
    OUTPUT_STAGE_PARQUET: "/Volumes/<cat>/<schema>/sgc/ray_output_stage_parquet_w1"
compute:
  gpus: 1
  gpu_type: a10
max_retries: 0
code_source:
  type: snapshot
  snapshot:
    allow_uncommitted: true
    repo_path: <UPDATE_THIS_to_local_path_of_sgcli-inference>
    include_paths:
      - ray_esm2_embed
command: |-
  echo ">>> ESM-2 batch embedding via Ray Data on SGC"
  python3 $CODE_SOURCE_PATH/ray_esm2_embed/embed.py
