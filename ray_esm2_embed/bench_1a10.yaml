experiment_name: esm2-bench-1a10
environment:
  dependencies: dependencies.yaml
  env_variables:
    NCCL_NET_PLUGIN: "none"
    NUM_WORKERS: "1"
    BATCH_SIZE: "32"
    MAX_LENGTH: "1024"
    ESM2_MODEL: "facebook/esm2_t33_650M_UR50D"
    INPUT_STAGE_DIR:      "/Volumes/<cat>/<schema>/sgc/ray_input_stage_10k"
    OUTPUT_STAGE_PARQUET: "/Volumes/<cat>/<schema>/sgc/ray_output_10k_1a10"
compute:
  gpus: 1
  gpu_type: a10
max_retries: 0
code_source:
  type: snapshot
  snapshot:
    allow_uncommitted: true
    repo_path: <UPDATE_THIS_to_local_path_of_sgcli-inference>
    include_paths:
      - ray_esm2_embed
command: |-
  echo ">>> Benchmark: 1 A10, 10K seqs"
  python3 $CODE_SOURCE_PATH/ray_esm2_embed/embed.py
